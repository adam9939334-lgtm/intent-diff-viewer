# Review Checkpoint GitHub Action — v1
# =====================================
# Add this file to .github/workflows/review-checkpoint.yml in your repository.
#
# Supports two PR description formats:
#
# Format 1 — Agent-generated (preferred):
#   <!-- review-checkpoint
#   {"v":1,"goal":"...","constraints":"...","riskAreas":"...","agent":"claude-code","ts":"..."}
#   -->
#
# Format 2 — Human-written (fallback):
#   ## Goal
#   ## Constraints
#   ## Risk Areas
#
# No API keys or secrets required.
# See: https://github.com/adam9939334-lgtm/intent-diff-viewer

name: Review Checkpoint

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  checkpoint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post Review Checkpoint
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body ?? '';
            const prUrl = context.payload.pull_request.html_url;
            const prNumber = context.payload.pull_request.number;

            function parseJsonBlock(text) {
              const start = text.indexOf('<!-- review-checkpoint');
              if (start === -1) return null;
              const end = text.indexOf('-->', start);
              if (end === -1) return null;
              const raw = text.slice(start + '<!-- review-checkpoint'.length, end).trim();
              try {
                const data = JSON.parse(raw);
                if (typeof data.goal !== 'string') return null;
                return data;
              } catch {
                return null;
              }
            }

            function parseMarkdownSection(text, names) {
              const pattern = new RegExp(
                `##\\s+(?:${names.join('|')})\\s*\\n([\\s\\S]*?)(?=\\n##|$)`,
                'i'
              );
              const match = text.match(pattern);
              if (!match) return null;
              const value = match[1].trim();
              return value.length > 0 ? value : null;
            }

            const jsonData = parseJsonBlock(body);
            let goal, constraints, riskAreas, agentLabel;

            if (jsonData) {
              goal = jsonData.goal || null;
              constraints = jsonData.constraints || null;
              riskAreas = jsonData.riskAreas || null;
              agentLabel = jsonData.agent ? ` · generated by ${jsonData.agent}` : ' · agent-generated';
              console.log(`Parsed JSON block (agent: ${jsonData.agent ?? 'unknown'}, v${jsonData.v ?? '?'})`);
            } else {
              goal = parseMarkdownSection(body, ['Goal']);
              constraints = parseMarkdownSection(body, ['Constraints', 'Constraint']);
              riskAreas = parseMarkdownSection(body, ['Risk Areas', 'Risk Area', 'Risks', 'Risk']);
              agentLabel = '';
              if (goal) console.log('Parsed markdown sections (human-written)');
            }

            if (!goal) {
              console.log('No checkpoint data found — skipping.');
              return;
            }

            const intentData = Buffer.from(JSON.stringify({
              goal,
              constraints: constraints ?? '',
              riskAreas: riskAreas ?? ''
            })).toString('base64');
            const viewUrl = `https://intent-diff-viewer.vercel.app/view?pr=${encodeURIComponent(prUrl)}&data=${intentData}`;

            const comment = [
              '<!-- review-checkpoint-bot -->',
              `### Review Checkpoint${agentLabel}`,
              '',
              `**Goal** — ${goal}`,
              '',
              `**Constraints** — ${constraints ?? '_Not provided._'}`,
              '',
              `**⚠ Risk Areas** — ${riskAreas ?? '_Not specified._'}`,
              '',
              `[View diff with context ↗](${viewUrl})`,
            ].join('\n');

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });

              const existing = comments.find(c =>
                c.body?.includes('<!-- review-checkpoint-bot -->')
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: comment,
                });
                console.log(`Updated Review Checkpoint comment (id: ${existing.id})`);
              } else {
                const created = await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: comment,
                });
                console.log(`Posted Review Checkpoint comment (id: ${created.data.id})`);
              }
            } catch (err) {
              if (err.status === 403) {
                console.log('Skipping: no write permission (fork PR or restricted token). This is expected.');
                return;
              }
              console.error(`Failed to post checkpoint comment: ${err.message}`);
              throw err;
            }
