name: Review Checkpoint

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  checkpoint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post Review Checkpoint
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body ?? '';
            const prUrl = context.payload.pull_request.html_url;
            const prNumber = context.payload.pull_request.number;

            function parseSection(text, names) {
              const pattern = new RegExp(
                `##\\s+(?:${names.join('|')})\\s*\\n([\\s\\S]*?)(?=\\n##|$)`,
                'i'
              );
              const match = text.match(pattern);
              if (!match) return null;
              const value = match[1].trim();
              return value.length > 0 ? value : null;
            }

            const goal = parseSection(body, ['Goal']);
            const constraints = parseSection(body, ['Constraints', 'Constraint']);
            const riskAreas = parseSection(body, ['Risk Areas', 'Risk Area', 'Risks', 'Risk']);

            if (!goal) {
              console.log('No ## Goal section found — skipping checkpoint.');
              return;
            }

            const intentData = Buffer.from(JSON.stringify({
              goal,
              constraints: constraints ?? '',
              riskAreas: riskAreas ?? ''
            })).toString('base64');
            const viewUrl = `https://intent-diff-viewer.vercel.app/view?pr=${encodeURIComponent(prUrl)}&data=${intentData}`;

            const comment = [
              '<!-- review-checkpoint-bot -->',
              '### Review Checkpoint',
              '',
              `**Goal** — ${goal}`,
              '',
              `**Constraints** — ${constraints ?? '_Not provided._'}`,
              '',
              `**⚠ Risk Areas** — ${riskAreas ?? '_Not specified._'}`,
              '',
              `[View diff with context ↗](${viewUrl})`,
            ].join('\n');

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });

              const existing = comments.find(c =>
                c.body?.includes('<!-- review-checkpoint-bot -->')
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: comment,
                });
                console.log(`Updated Review Checkpoint comment (id: ${existing.id})`);
              } else {
                const created = await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: comment,
                });
                console.log(`Posted Review Checkpoint comment (id: ${created.data.id})`);
              }
            } catch (err) {
              if (err.status === 403) {
                console.log('Skipping: no write permission (fork PR or restricted token). This is expected.');
                return;
              }
              console.error(`Failed to post checkpoint comment: ${err.message}`);
              throw err;
            }
